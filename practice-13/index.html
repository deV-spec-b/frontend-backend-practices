<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4285f4">
    <link rel="apple-touch-icon" href="icons/note-256x256.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Заметки (App Shell)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="icon" href="icons/note-64-64.png" sizes="64x64" type="image/png">
</head>
<body>
    <header class="container" style="margin-top: 1rem;">
        <h1 class="is-center">📝 Мои заметки</h1>
        <nav class="tabs is-center">
            <button id="home-btn" class="tab active col-6">Главная</button>
            <button id="about-btn" class="tab col-6">О приложении</button>
        </nav>
    </header>
    <main id="app-content" class="container" style="margin-top: 2rem;">
        <!-- Сюда будет загружаться контент -->
        <div class="is-center">Загрузка...</div>
    </main>

    <script src="https://unpkg.com/socket.io-client@4.5.4/dist/socket.io.min.js"></script>
    <script src="app.js"></script>

<footer class="is-center" style="margin: 2rem 0;">
    <button id="enable-push" class="button success">🔔 Включить уведомления</button>
    <button id="disable-push" class="button error" style="display:none;">🔕 Отключить уведомления</button>
</footer>

</body>
</html>
